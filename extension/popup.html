<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 300px;
      margin: 0;
      padding: 1.5rem;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #fbf9f6;
      color: #312e81;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .aurora-1 {
      position: absolute;
      top: -30px; left: -30px;
      width: 150px; height: 150px;
      background: #0ea5e9;
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0.25;
      z-index: -1;
    }
    .aurora-2 {
      position: absolute;
      bottom: -30px; right: -30px;
      width: 150px; height: 150px;
      background: #f59e0b;
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0.25;
      z-index: -1;
    }
    h2 {
      margin: 0 0 0.5rem 0;
      font-size: 1.5rem;
      font-weight: 800;
      font-family: serif; /* Matches Literata */
    }
    p {
      color: #4b5563;
      font-size: 0.85rem;
      margin: 0 0 1.5rem 0;
      line-height: 1.4;
    }
    button {
      background: #10b981;
      color: #fff;
      border: none;
      padding: 0.8rem 1.5rem;
      border-radius: 999px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
      transition: all 0.2s;
    }
    button:hover {
      transform: translateY(-1px);
      background: #059669;
      box-shadow: 0 6px 16px rgba(16, 185, 129, 0.4);
    }
    .video-info {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0,0,0,0.05);
      border-radius: 12px;
      padding: 0.8rem;
      margin-bottom: 1.5rem;
      font-size: 0.8rem;
      color: #1e293b;
      display: none;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .icon {
      width: 18px; height: 18px;
    }
  </style>
</head>
<body>
  <div class="aurora-1"></div>
  <div class="aurora-2"></div>
  
  <h2>Alexandria</h2>
  <p>Distill the noise. Discover the essence.</p>
  
  <div id="video-info" class="video-info">
    <strong>Target:</strong> <span id="video-title">Loading...</span>
  </div>

  <button id="summarize-btn">
    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
    Open Alexandria
  </button>

  <script src="popup.js"></script>
</body>
</html>
